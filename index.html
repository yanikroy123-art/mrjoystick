<style>

header{background:#1a1a2e;padding:15px}
nav a{color:white;margin:0 15px;text-decoration:none}
.hero{padding:60px;text-align:center;background:linear-gradient(45deg,#1a1a2e,#3a0ca3)}

.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.card{background:#1f1f2e;border-radius:12px;overflow:hidden;transition:0.3s}
.card:hover{transform:translateY(-5px);box-shadow:0 10px 20px rgba(0,0,0,0.5)}
.card img{width:100%;height:180px;object-fit:cover}
.card-content{padding:15px}
.btn-buy{display:block;margin-top:10px;background:#25D366;color:white;text-align:center;padding:10px;border-radius:8px;text-decoration:none}
footer{background:#1a1a2e;text-align:center;padding:20px}

</head>
